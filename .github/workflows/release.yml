name: Build and Release CV

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile CV
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv.tex
          latexmk_use_xelatex: true

      - name: Rename artifact
        run: |
          mv cv.pdf Hisham_BinSeddeq_CV.pdf
          ls -la Hisham_BinSeddeq_CV.pdf

      - name: Generate preview image
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq poppler-utils
          pdftoppm -png -r 200 -f 1 -l 1 Hisham_BinSeddeq_CV.pdf preview
          mv preview-1.png Hisham_BinSeddeq_CV_preview.png
          ls -la Hisham_BinSeddeq_CV.pdf Hisham_BinSeddeq_CV_preview.png

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE_TAG="v$(date -u +%Y.%m.%d)"
          TAG="$DATE_TAG"
          SUFFIX=1
          while gh release view "$TAG" &>/dev/null; do
            TAG="${DATE_TAG}.${SUFFIX}"
            SUFFIX=$((SUFFIX + 1))
          done
          COMMIT_SHA=$(git rev-parse --short HEAD)
          gh release create "$TAG" Hisham_BinSeddeq_CV.pdf Hisham_BinSeddeq_CV_preview.png \
            --title "CV $TAG" \
            --notes "Compiled from $COMMIT_SHA"
